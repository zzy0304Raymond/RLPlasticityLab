name: Bug report
description: Report a reproducible problem in RLPlasticity
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough detail to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Commands, code, or steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, torch version, OS, and relevant install details
  - type: textarea
    id: artifacts
    attributes:
      label: Relevant artifacts
      description: Report output, stack traces, or sample metadata. Do not upload sensitive checkpoints.
