<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">RLPlasticity healthy vs frozen-encoder comparison</title>
  <desc id="desc">Side-by-side comparison of healthy and frozen-encoder plasticity probe outputs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5efe7" />
      <stop offset="100%" stop-color="#eee4d4" />
    </linearGradient>
  </defs>
  <rect width="1120" height="520" fill="url(#bg)" />
  <text x="60" y="68" font-size="34" font-weight="700" fill="#1f1d1a">RLPlasticity showcase: healthy vs frozen encoder</text>
  <text x="60" y="104" font-size="18" fill="#5c5448">Both reports are generated from real demo artifacts in this repository.</text>

  <rect x="60" y="140" width="470" height="320" rx="24" fill="#fffdf8" stroke="#d7cbbd" />
  <rect x="590" y="140" width="470" height="320" rx="24" fill="#fffdf8" stroke="#d7cbbd" />

  <text x="88" y="182" font-size="18" font-weight="700" fill="#0d6b57">Healthy checkpoint</text>
  <text x='88' y='220' font-size='24' font-weight='700' fill='#1f1d1a'>Probe result</text>
<text x='88' y='256' font-size='16' fill='#3f3a33'>No acute issue detected. Plasticity score=1.000 (update-active=1.000, grad-active=1.000)</text>
<text x='88' y='284' font-size='16' fill='#3f3a33'>Plasticity score=1.000 (update-active=1.000, grad-active=1.000)</text>
<text x='88' y='312' font-size='16' fill='#3f3a33'>Stagnant layer fraction=0.000</text>
<text x='88' y='340' font-size='16' fill='#3f3a33'>encoder plasticity score=1.000</text>
<text x='88' y='368' font-size='16' fill='#3f3a33'>trunk plasticity score=1.000</text>
<text x='88' y='396' font-size='16' fill='#3f3a33'>policy plasticity score=1.000</text>
<text x='88' y='424' font-size='16' fill='#3f3a33'>No diagnostic rule fired.</text>
<rect x='88' y='380' width='360' height='6' rx='3' fill='#0d6b57' opacity='0.9' />

  <text x="618" y="182" font-size="18" font-weight="700" fill="#b53d23">Frozen encoder</text>
  <text x='618' y='220' font-size='24' font-weight='700' fill='#1f1d1a'>Probe result</text>
<text x='618' y='256' font-size='16' fill='#3f3a33'>The encoder is adapting less than downstream layers.</text>
<text x='618' y='284' font-size='16' fill='#3f3a33'>Plasticity score=0.778 (update-active=0.667, grad-active=0.667)</text>
<text x='618' y='312' font-size='16' fill='#3f3a33'>Stagnant layer fraction=0.333 (examples: encoder.0)</text>
<text x='618' y='340' font-size='16' fill='#3f3a33'>encoder plasticity score=0.000</text>
<text x='618' y='368' font-size='16' fill='#3f3a33'>trunk plasticity score=1.000</text>
<text x='618' y='396' font-size='16' fill='#3f3a33'>policy plasticity score=1.000</text>
<text x='618' y='424' font-size='16' fill='#3f3a33'>The encoder is adapting less than downstream layers.</text>
<rect x='618' y='380' width='360' height='6' rx='3' fill='#b53d23' opacity='0.9' />
</svg>
